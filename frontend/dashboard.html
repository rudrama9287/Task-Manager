<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Team Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="sidebar-menu" class="sidebar"></div>
    
    <div class="main-content">
        <div class="container-fluid">
            <h2 class="mb-4">Dashboard</h2>
            <div id="alert" class="alert d-none"></div>
            
            <div class="row g-4" id="stats-container">
                <div class="col-md-3">
                    <div class="card-premium">
                        <div class="stat-label">Assigned Tasks</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-premium">
                        <div class="stat-label text-success">Completed</div>
                        <div class="stat-value" id="stat-completed">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-premium">
                        <div class="stat-label text-primary">In Progress</div>
                        <div class="stat-value" id="stat-in-progress">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-premium">
                        <div class="stat-label text-warning">Pending</div>
                        <div class="stat-value" id="stat-pending">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-premium">
                        <div class="stat-label text-danger">Overdue</div>
                        <div class="stat-value" id="stat-overdue">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
