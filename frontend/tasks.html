<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks - Team Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="sidebar-menu" class="sidebar"></div>

    <div class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Tasks</h2>
                <button id="btn-create-task" class="btn btn-premium btn-primary d-none" data-bs-toggle="modal" data-bs-target="#taskModal">
                    + New Task
                </button>
            </div>

            <div id="alert" class="alert d-none"></div>

            <div class="table-premium">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>Task Title</th>
                            <th>Project</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-tbody">
                        <!-- Content here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="taskForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Create Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>Title</label>
                            <input type="text" id="task-title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea id="task-desc" class="form-control"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Due Date</label>
                            <input type="date" id="task-due" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Project</label>
                            <select id="task-project" class="form-select" required>
                                <!-- Projects injected here -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Assigned To</label>
                            <select id="task-user" class="form-select" required>
                                <!-- Users injected here -->
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/tasks.js"></script>
</body>
</html>
